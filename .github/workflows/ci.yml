name: Testing
on:
    push: 
          branches: [main]
    pull_request:
          branches: [main]
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
          - name: checkout repo
            uses: actions/checkout@v4
          - name: setup python
            uses: actions/setup-python@v5
            with:
              python-version: "3.13"
          - name: install uv
            run: pip install uv
          - name: install dependencies
            run: uv sync
          - name: run tests
            run: uv run pytest tests/
